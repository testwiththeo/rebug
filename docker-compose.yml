name: rebug

services:
  api:
    build:
      context: ./backend
    environment:
      DATABASE_URL: postgresql+asyncpg://rebug:rebug@postgres:5432/rebug
      VIEWER_BASE_URL: http://localhost:3000
      BACKEND_PUBLIC_BASE_URL: http://localhost:8000
      TOKEN_ENCRYPTION_SECRET: ${TOKEN_ENCRYPTION_SECRET:-dev-insecure-change-me}
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o}
      S3_ENDPOINT_URL: http://minio:9000
      S3_ACCESS_KEY_ID: minioadmin
      S3_SECRET_ACCESS_KEY: minioadmin
      S3_BUCKET_NAME: rebug-sessions
      JIRA_CLIENT_ID: ${JIRA_CLIENT_ID:-}
      JIRA_CLIENT_SECRET: ${JIRA_CLIENT_SECRET:-}
      JIRA_REDIRECT_URI: ${JIRA_REDIRECT_URI:-http://localhost:8000/api/v1/integrations/jira/callback}
      JIRA_SCOPES: ${JIRA_SCOPES:-read:jira-work write:jira-work offline_access}
      JIRA_PROJECT_KEY: ${JIRA_PROJECT_KEY:-}
      JIRA_ISSUE_TYPE: ${JIRA_ISSUE_TYPE:-Bug}
      JIRA_REPLAY_CUSTOM_FIELD: ${JIRA_REPLAY_CUSTOM_FIELD:-}
      JIRA_CLOUD_ID: ${JIRA_CLOUD_ID:-}
      SLACK_CLIENT_ID: ${SLACK_CLIENT_ID:-}
      SLACK_CLIENT_SECRET: ${SLACK_CLIENT_SECRET:-}
      SLACK_REDIRECT_URI: ${SLACK_REDIRECT_URI:-http://localhost:8000/api/v1/integrations/slack/callback}
      SLACK_SCOPES: ${SLACK_SCOPES:-incoming-webhook,chat:write}
      SLACK_DEFAULT_CHANNEL: ${SLACK_DEFAULT_CHANNEL:-}
      SLACK_INCOMING_WEBHOOK_URL: ${SLACK_INCOMING_WEBHOOK_URL:-}
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_started
      redis:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/healthz', timeout=5)\""]
      interval: 30s
      timeout: 5s
      start_period: 20s
      retries: 3

  worker:
    build:
      context: ./backend
    command: celery -A app.core.celery_app.celery_app worker --loglevel=info
    environment:
      DATABASE_URL: postgresql+asyncpg://rebug:rebug@postgres:5432/rebug
      VIEWER_BASE_URL: http://localhost:3000
      BACKEND_PUBLIC_BASE_URL: http://localhost:8000
      TOKEN_ENCRYPTION_SECRET: ${TOKEN_ENCRYPTION_SECRET:-dev-insecure-change-me}
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o}
      S3_ENDPOINT_URL: http://minio:9000
      S3_ACCESS_KEY_ID: minioadmin
      S3_SECRET_ACCESS_KEY: minioadmin
      S3_BUCKET_NAME: rebug-sessions
      JIRA_CLIENT_ID: ${JIRA_CLIENT_ID:-}
      JIRA_CLIENT_SECRET: ${JIRA_CLIENT_SECRET:-}
      JIRA_REDIRECT_URI: ${JIRA_REDIRECT_URI:-http://localhost:8000/api/v1/integrations/jira/callback}
      JIRA_SCOPES: ${JIRA_SCOPES:-read:jira-work write:jira-work offline_access}
      JIRA_PROJECT_KEY: ${JIRA_PROJECT_KEY:-}
      JIRA_ISSUE_TYPE: ${JIRA_ISSUE_TYPE:-Bug}
      JIRA_REPLAY_CUSTOM_FIELD: ${JIRA_REPLAY_CUSTOM_FIELD:-}
      JIRA_CLOUD_ID: ${JIRA_CLOUD_ID:-}
      SLACK_CLIENT_ID: ${SLACK_CLIENT_ID:-}
      SLACK_CLIENT_SECRET: ${SLACK_CLIENT_SECRET:-}
      SLACK_REDIRECT_URI: ${SLACK_REDIRECT_URI:-http://localhost:8000/api/v1/integrations/slack/callback}
      SLACK_SCOPES: ${SLACK_SCOPES:-incoming-webhook,chat:write}
      SLACK_DEFAULT_CHANNEL: ${SLACK_DEFAULT_CHANNEL:-}
      SLACK_INCOMING_WEBHOOK_URL: ${SLACK_INCOMING_WEBHOOK_URL:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started

  beat:
    build:
      context: ./backend
    command: celery -A app.core.celery_app.celery_app beat --loglevel=info
    environment:
      DATABASE_URL: postgresql+asyncpg://rebug:rebug@postgres:5432/rebug
      VIEWER_BASE_URL: http://localhost:3000
      BACKEND_PUBLIC_BASE_URL: http://localhost:8000
      TOKEN_ENCRYPTION_SECRET: ${TOKEN_ENCRYPTION_SECRET:-dev-insecure-change-me}
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o}
      S3_ENDPOINT_URL: http://minio:9000
      S3_ACCESS_KEY_ID: minioadmin
      S3_SECRET_ACCESS_KEY: minioadmin
      S3_BUCKET_NAME: rebug-sessions
      JIRA_CLIENT_ID: ${JIRA_CLIENT_ID:-}
      JIRA_CLIENT_SECRET: ${JIRA_CLIENT_SECRET:-}
      JIRA_REDIRECT_URI: ${JIRA_REDIRECT_URI:-http://localhost:8000/api/v1/integrations/jira/callback}
      JIRA_SCOPES: ${JIRA_SCOPES:-read:jira-work write:jira-work offline_access}
      JIRA_PROJECT_KEY: ${JIRA_PROJECT_KEY:-}
      JIRA_ISSUE_TYPE: ${JIRA_ISSUE_TYPE:-Bug}
      JIRA_REPLAY_CUSTOM_FIELD: ${JIRA_REPLAY_CUSTOM_FIELD:-}
      JIRA_CLOUD_ID: ${JIRA_CLOUD_ID:-}
      SLACK_CLIENT_ID: ${SLACK_CLIENT_ID:-}
      SLACK_CLIENT_SECRET: ${SLACK_CLIENT_SECRET:-}
      SLACK_REDIRECT_URI: ${SLACK_REDIRECT_URI:-http://localhost:8000/api/v1/integrations/slack/callback}
      SLACK_SCOPES: ${SLACK_SCOPES:-incoming-webhook,chat:write}
      SLACK_DEFAULT_CHANNEL: ${SLACK_DEFAULT_CHANNEL:-}
      SLACK_INCOMING_WEBHOOK_URL: ${SLACK_INCOMING_WEBHOOK_URL:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: rebug
      POSTGRES_PASSWORD: rebug
      POSTGRES_DB: rebug
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rebug -d rebug"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

volumes:
  postgres_data:
  minio_data:
